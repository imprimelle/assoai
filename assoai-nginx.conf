# Détection crawlers sociaux (dans le bloc http, avant le server)
map $http_user_agent $is_crawler {
    default 0;
    "~*WhatsApp" 1;
    "~*FacebookExternalHit" 1;
    "~*facebookexternalhit" 1;
    "~*Twitterbot" 1;
    "~*LinkedInBot" 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Pages publiques : crawler → OG proxy, humains → SPA React
    location ~ ^/public/(?<og_type>checklist|doc)/(?<og_id>[^/?]+)$ {
        error_page 418 = @og_proxy;
        if ($is_crawler) {
            return 418;
        }
        # Humains normaux → SPA React
        try_files $uri $uri/ /index.html;
    }

    # Handler dédié crawlers (exécuté via error_page 418)
    location @og_proxy {
        proxy_pass http://hermes-agent:11434/og/$og_type/$og_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse proxy API Hermes (keep /hermes prefix)
    location /hermes/ {
        proxy_pass http://hermes-agent:11434/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        client_max_body_size 5M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location /api/pdf {
        proxy_pass http://pdf-service:3000/api/pdf;
        proxy_read_timeout 45s;
        client_max_body_size 10M;
    }
}
