# assoai-pdf.conf — Reverse proxy pour le microservice Puppeteer PDF
# À inclure dans le vhost assoai (nginx)
location /api/pdf {
    proxy_pass http://pdf-service:3000/api/pdf;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeout HTTP long pour la génération PDF (Puppeteer + images)
    proxy_connect_timeout 10s;
    proxy_read_timeout 45s;
    proxy_send_timeout 10s;

    # Augmenter la taille max du body (HTML + CSS inline)
    client_max_body_size 10M;
}
