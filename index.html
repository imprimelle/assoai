<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssoAI — CRM Signalétique Intelligent</title>
    <meta name="description" content="AssoAI — Application de gestion d'entreprise pour la signalétique et les enseignes. Factures, devis, commandes, cahiers des charges avec IA intégrée." />
    <meta name="author" content="AssoAI" />

    <meta property="og:title" content="AssoAI — CRM Signalétique" />
    <meta property="og:description" content="Gestion d'entreprise intelligente pour le secteur de la signalétique." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AssoAI — CRM Signalétique" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FF8139" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AssoAI" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Cache-control: force le navigateur à toujours revalider -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Force le Service Worker à se ré-enregistrer proprement (une seule fois)
      if ('serviceWorker' in navigator && !sessionStorage.getItem('sw-reset-done')) {
        sessionStorage.setItem('sw-reset-done', '1');
        navigator.serviceWorker.getRegistrations().then(registrations => {
          Promise.all(registrations.map(reg => reg.unregister()));
        }).then(() => {
          window.location.reload();
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
